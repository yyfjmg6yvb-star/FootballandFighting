# ============================================================
# Football & Fighting — Cloudflare Wrangler Config
# ============================================================

name = "football-and-fighting"
compatibility_date = "2024-01-01"

[assets]
directory = "."

[[d1_databases]]
binding = "DB"
database_name = "FF_DB"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

[vars]
STRIPE_PRICE_ID = "PASTE_YOUR_STRIPE_PRICE_ID_HERE"
SITE_URL = "https://footballandfighting.com"
MEMBERSHIP_PRICE_PENCE = "100"
